name: Build and Deploy

on:
push:
branches:
- main

env:
AWS_REGION: us-east-1
EKS_CLUSTER_NAME: guestbook-cluster
DOCKERHUB_IMAGE: adityaisnomore/guestbook-app

jobs:
build-deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build and Push Image
    run: |
      docker build -t $DOCKERHUB_IMAGE:${{ github.sha }} .
      docker tag $DOCKERHUB_IMAGE:${{ github.sha }} $DOCKERHUB_IMAGE:latest

      docker push $DOCKERHUB_IMAGE:${{ github.sha }}
      docker push $DOCKERHUB_IMAGE:latest

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Install kubectl
    uses: azure/setup-kubectl@v4

  - name: Install Helm
    uses: azure/setup-helm@v4

  - name: Update kubeconfig
    run: |
      aws eks update-kubeconfig \
        --region $AWS_REGION \
        --name $EKS_CLUSTER_NAME

  - name: Deploy to EKS
    run: |
      helm upgrade guestbook ./guestbook-chart \
        --namespace guestbook \
        --set web.image.tag=${{ github.sha }}

